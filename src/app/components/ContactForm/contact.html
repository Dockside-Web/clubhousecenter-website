<section class="contact-section" id="contact">
  <div class="container">
    <h2 class="section-title">Contact Us</h2>
    <div class="content-grid">
      <div class="form-section">
        <form name="contact" class="contact-form" action="https://usebasin.com/f/82e26e6b9b12" method="POST" enctype="multipart/form-data">
          <div class="form-grid">
            <div class="form-group">
              <label for="name" class="form-label">Name<span class="required-asterisk">*</span></label>
              <div class="input-container">
                <lucide-icon name="user" class="input-icon"></lucide-icon>
                <input type="text" id="name" name="name" class="form-input" formControlName="name" required />
              </div>
            </div>

            <div class="form-group">
              <label for="email" class="form-label">Email<span class="required-asterisk">*</span></label>
              <div class="input-container">
                <lucide-icon name="mail" class="input-icon"></lucide-icon>
                <input type="email" id="email" name="email" class="form-input" formControlName="email" required />
              </div>
            </div>

            <div class="form-group">
              <label for="phone" class="form-label">Phone<span class="required-asterisk">*</span></label>
              <div class="input-container">
                <lucide-icon name="phone" class="input-icon"></lucide-icon>
                <input type="tel" id="phone" name="phone" class="form-input" formControlName="phone" required />
              </div>
            </div>

            <div class="form-group">
              <label for="company" class="form-label">Company</label>
              <div class="input-container">
                <lucide-icon name="building" class="input-icon"></lucide-icon>
                <input type="text" id="company" name="company" class="form-input" formControlName="company" placeholder="Optional"/>
              </div>
            </div>
          </div>

          <div class="form-group full-width">
            <label for="message" class="form-label">Message<span class="required-asterisk">*</span></label>
            <textarea id="message" name="message" rows="4" class="form-textarea" formControlName="message"
              placeholder="Let us know which unit you're interested in, and any questions or preferred tour dates."
              required></textarea>
          </div>

          <button type="submit" class="submit-button">
            <lucide-icon name="send-horizontal" class="button-icon"></lucide-icon>
            Send Message
          </button>
        </form>
      </div>
      <div class="info-section">
        <p class="info-description">
          Interested in leasing space at Clubhouse Center? Contact our
          leasing team for more information or to schedule a tour of
          available spaces.
        </p>
        <div class="contact-card">
          <div class="contact-person">
            <h4 class="person-title">Leasing Contact</h4>
            <p class="person-name">Bill Caldwell</p>
          </div>
          <div class="contact-details">
            <div class="contact-item">
              <lucide-icon name="mail" class="contact-icon"></lucide-icon>
              <a href="mailto:clubhousepropmd@msn.com" class="contact-link">clubhousepropmd@msn.com</a>
            </div>
            <div class="contact-item">
              <lucide-icon name="phone" class="contact-icon"></lucide-icon>
              <a href="tel:+14109356062" class="contact-link">(410) 935-6062</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
